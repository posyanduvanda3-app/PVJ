<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posyandu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css?v=2">
    <!-- Library untuk membaca file Excel (.xlsx/.xls) di browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-overlay" class="mobile-overlay hidden"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-wrapper">
            <div class="login-header">
                <div class="login-logo">
                    <img src="Images/logo_posyandu.png" alt="Logo Posyandu" class="logo-login">
                </div>
                <h2 class="text-3xl font-black text-slate-800 mt-3">Posyandu <span class="text-emerald-600">Digital</span></h2>
            </div>
            <p class="text-center text-sm text-slate-500 mb-8">Sistem Informasi Pencatatan & Monitoring Pemeriksaan Kesehatan</p>
        
            <div class="card login-card">
                <form id="login-form" class="space-y-6">
                    <div id="login-error" class="hidden bg-rose-50 border-l-4 border-rose-500 p-3 rounded-r-md text-sm text-rose-700 font-medium"></div>
                
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="login-username" class="form-input" placeholder="Masukkan username" required>
                    </div>
                
                    <div class="form-group">
    <label class="form-label">Password</label>
    <!-- Wrapper Flexbox yang stabil di semua perangkat -->
    <div class="password-wrapper">
        <input type="password" id="login-password" class="form-input password-input" placeholder="Masukkan sandi Anda" required>
        <button type="button" id="toggle-password" class="toggle-btn" aria-label="Lihat Password">
            <!-- Ikon akan diisi otomatis oleh JavaScript -->
        </button>
    </div>
</div>
                
                    <button type="submit" class="btn btn-primary w-full">Masuk Aplikasi</button>
                </form>

                <!-- ✅ COPYRIGHT DITAMBAHKAN DI SINI -->
                <div class="mt-8 pt-6 border-t border-slate-100">
                    <p class="text-center text-xs text-slate-400 font-medium">
                        &copy; 2026 Posyandu Vanda 3. Hak Cipta Dilindungi.
                     </p>
                </div>
                

            </div>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="screen">
        <!-- Mobile Header -->
        <div class="mobile-header" id="mobile-header">
            <button id="menu-toggle" class="menu-toggle">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <h2 class="text-lg font-black text-slate-800">Posyandu Digital</h2>
        </div>

        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <header class="top-header" id="top-header"></header>
            <div class="view-container" id="view-container"></div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
