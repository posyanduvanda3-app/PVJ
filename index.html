<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posyandu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-overlay" class="mobile-overlay hidden"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-wrapper">
            <div class="login-header">
                <div class="login-logo">
                    <img src="images/logo_posyandu.png" alt="Logo Posyandu" class="logo-login" onerror="this.style.display='none'">
                </div>
                <h2 class="text-3xl font-black text-slate-800 mt-3">Posyandu <span class="text-emerald-600">Digital</span></h2>
            </div>
            <p class="text-center text-sm text-slate-500 mb-8">Sistem Informasi Pencatatan & Monitoring Pemeriksaan Kesehatan</p>
            
            <div class="card login-card">
                <form id="login-form" class="space-y-6">
                    <div id="login-error" class="hidden bg-rose-50 border-l-4 border-rose-500 p-3 rounded-r-md text-sm text-rose-700 font-medium"></div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="login-username" class="form-input" placeholder="Masukkan username (cth: admin, kader)" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-input" placeholder="Masukkan sandi Anda" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Pilih Peran (Role)</label>
                        <div class="role-selector">
                            <button type="button" class="role-btn active" data-role="Kader">Kader</button>
                            <button type="button" class="role-btn" data-role="Admin">Admin</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Masuk Aplikasi</button>
                </form>
                <div class="login-helper mt-6">
                    <span class="font-bold text-slate-700 block mb-1">Panduan Cepat Akses Demo:</span>
                    <ul class="text-xs text-slate-600 space-y-1">
                        <li>Akun Admin: <code>admin</code> | Sandi: <code>apa saja</code></li>
                        <li>Akun Kader: <code>kader</code> | Sandi: <code>apa saja</code></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="screen">
        <!-- Mobile Header -->
        <div class="mobile-header" id="mobile-header">
            <button id="menu-toggle" class="menu-toggle">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <h2 class="text-lg font-black text-slate-800">Posyandu Digital</h2>
        </div>

        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <header class="top-header" id="top-header"></header>
            <div class="view-container" id="view-container"></div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
